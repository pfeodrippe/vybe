<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vybe Raylib Wasm</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101014;
      color: #e8e2cf;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      outline: none;
      background: #101014;
    }
    #status {
      position: fixed;
      left: 12px;
      bottom: 10px;
      padding: 6px 8px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.55);
      color: #e8e2cf;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="0"></canvas>
  <div id="status">loading raylib.wasm...</div>
  <script>
    window.vybeRaylibAssetVersion = String(Date.now());
    document.write('<script src="./raylib.js?v='
                   + encodeURIComponent(window.vybeRaylibAssetVersion)
                   + '"><\/script>');
  </script>
  <script>
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    let closeRequested = false;
    const wrappedFns = new Map();
    const layouts = new Map();
    const layoutIds = new Map();
    const functionPlans = new Map();
    const aggregateScratch = new Map();
    let batchSeq = 0;
    const inputState = {
      keysDown: new Set(),
      keysPressed: new Set(),
      keysReleased: new Set(),
      mouseDown: new Set(),
      mousePressed: new Set(),
      mouseReleased: new Set(),
      actualMouseX: 0,
      actualMouseY: 0,
      actualMouseKnown: false,
      mouseX: 0,
      mouseY: 0,
      mouseDeltaX: 0,
      mouseDeltaY: 0,
      focused: true
    };

    function raylibKeyCode(event) {
      return event.keyCode || event.which || 0;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function canvasWidth(rect) {
      return canvas.width || rect.width || 1;
    }

    function canvasHeight(rect) {
      return canvas.height || rect.height || 1;
    }

    function clampMousePosition(rect) {
      const width = canvasWidth(rect);
      const height = canvasHeight(rect);
      inputState.mouseX = clamp(inputState.mouseX, 0, width);
      inputState.mouseY = clamp(inputState.mouseY, 0, height);
    }

    function updateMousePosition(event) {
      const rect = canvas.getBoundingClientRect();
      const width = canvasWidth(rect);
      const height = canvasHeight(rect);
      const x = (event.clientX - rect.left) * width / (rect.width || width);
      const y = (event.clientY - rect.top) * height / (rect.height || height);
      if (!inputState.actualMouseKnown) {
        inputState.actualMouseKnown = true;
        inputState.actualMouseX = x;
        inputState.actualMouseY = y;
        inputState.mouseX = clamp(x, 0, width);
        inputState.mouseY = clamp(y, 0, height);
        return;
      }
      const dx = x - inputState.actualMouseX;
      const dy = y - inputState.actualMouseY;
      inputState.actualMouseX = x;
      inputState.actualMouseY = y;
      inputState.mouseDeltaX += dx;
      inputState.mouseDeltaY += dy;
      inputState.mouseX += dx;
      inputState.mouseY += dy;
      clampMousePosition(rect);
    }

    window.addEventListener('beforeunload', () => {
      closeRequested = true;
    });

	    window.addEventListener('keydown', (event) => {
	      if (event.key === 'Escape') closeRequested = true;
      inputState.focused = true;
      const code = raylibKeyCode(event);
      if (code) {
        if (!inputState.keysDown.has(code)) inputState.keysPressed.add(code);
        inputState.keysDown.add(code);
      }
	    });

    window.addEventListener('keyup', (event) => {
      const code = raylibKeyCode(event);
      if (code) {
        inputState.keysDown.delete(code);
        inputState.keysReleased.add(code);
      }
    });

    canvas.addEventListener('mousedown', (event) => {
      updateMousePosition(event);
      if (!inputState.mouseDown.has(event.button)) inputState.mousePressed.add(event.button);
      inputState.mouseDown.add(event.button);
      canvas.focus();
    });

    canvas.addEventListener('mouseup', (event) => {
      updateMousePosition(event);
      inputState.mouseDown.delete(event.button);
      inputState.mouseReleased.add(event.button);
    });

    canvas.addEventListener('mousemove', updateMousePosition);

    window.addEventListener('focus', () => {
      inputState.focused = true;
    });

    window.addEventListener('blur', () => {
      inputState.focused = false;
      inputState.keysDown.clear();
      inputState.mouseDown.clear();
    });

	    const originalGetContext = canvas.getContext.bind(canvas);
	    canvas.getContext = (kind, attrs) => {
	      if (kind === 'webgl' || kind === 'webgl2') {
	        return originalGetContext(kind, {
	          ...(attrs || {}),
	          alpha: false,
	          antialias: false,
	          majorVersion: 2,
	          powerPreference: 'high-performance',
	          preserveDrawingBuffer: false
	        });
	      }
	      return originalGetContext(kind, attrs);
	    };

	    function writeCString(Module, text) {
      const bytes = Module.lengthBytesUTF8(text) + 1;
      const ptr = Module._malloc(bytes);
      Module.stringToUTF8(text, ptr, bytes);
      return ptr;
    }

    function writeColor(Module, r, g, b, a) {
      const ptr = Module._malloc(4);
      Module.setValue(ptr, r & 255, 'i8');
      Module.setValue(ptr + 1, g & 255, 'i8');
      Module.setValue(ptr + 2, b & 255, 'i8');
      Module.setValue(ptr + 3, a & 255, 'i8');
      return ptr;
    }

    function bridgeSource() {
      function childPaths(layout, path) {
        const prefix = path.join('/') + '/';
        return layout.fields.some((field) => field.path.join('/').startsWith(prefix)
                                   && field.path.length > path.length);
      }

      function valueAt(value, path) {
        let current = value;
        for (const key of path) {
          if (current == null) return 0;
          current = current[key];
        }
        return current == null ? 0 : current;
      }

      function writeScalar(Module, ptr, field, value) {
        const offset = ptr + field.offset;
        const count = field['array-count'];
        const values = count ? value || [] : [value];
        const writeOne = (idx, v) => {
          const p = offset + idx * scalarSize(field.type);
          switch (field.type) {
            case 'double': Module.setValue(p, Number(v) || 0, 'double'); break;
            case 'float': Module.setValue(p, Number(v) || 0, 'float'); break;
            case 'long':
            case 'long-long': Module.setValue(p, Number(v) || 0, 'i64'); break;
            case 'uint':
            case 'int': Module.setValue(p, Number(v) || 0, 'i32'); break;
            case 'short': Module.setValue(p, Number(v) || 0, 'i16'); break;
            case 'byte':
            case 'boolean': Module.setValue(p, Number(v) || 0, 'i8'); break;
            case 'pointer':
            case '*': Module.setValue(p, Number(v) || 0, 'i32'); break;
            default: Module.setValue(p, Number(v) || 0, 'i32'); break;
          }
        };
        if (count) {
          for (let i = 0; i < count; i++) writeOne(i, values[i] || 0);
        } else {
          writeOne(0, value);
        }
      }

      function scalarSize(type) {
        switch (type) {
          case 'double':
          case 'long':
          case 'long-long': return 8;
          case 'short': return 2;
          case 'byte':
          case 'boolean': return 1;
          default: return 4;
        }
      }

      function readScalar(Module, ptr, field) {
        const offset = ptr + field.offset;
        const count = field['array-count'];
        const readOne = (idx) => {
          const p = offset + idx * scalarSize(field.type);
          switch (field.type) {
            case 'double': return Module.getValue(p, 'double');
            case 'float': return Module.getValue(p, 'float');
            case 'long':
            case 'long-long': return Module.getValue(p, 'i64');
            case 'uint': return Module.getValue(p, 'i32') >>> 0;
            case 'int': return Module.getValue(p, 'i32');
            case 'short': return Module.getValue(p, 'i16');
            case 'byte': return Module.getValue(p, 'i8');
            case 'boolean': return Module.getValue(p, 'i8') !== 0;
            case 'pointer':
            case '*': return Module.getValue(p, 'i32') >>> 0;
            default: return Module.getValue(p, 'i32');
          }
        };
        if (!count) return readOne(0);
        const values = [];
        for (let i = 0; i < count; i++) values.push(readOne(i));
        return values;
      }

      function assignPath(target, path, value) {
        let current = target;
        for (let i = 0; i < path.length - 1; i++) {
          current[path[i]] = current[path[i]] || {};
          current = current[path[i]];
        }
        current[path[path.length - 1]] = value;
      }

      function writeAggregate(Module, layout, value) {
        const ptr = Module._malloc(layout.size);
        writeAggregateInto(Module, ptr, layout, value);
        return ptr;
      }

      function writeAggregateInto(Module, ptr, layout, value) {
        const flat = Array.isArray(value) ? value : null;
        let flatIndex = 0;
        for (let i = 0; i < layout.size; i++) Module.setValue(ptr + i, 0, 'i8');
        for (const field of layout.fields) {
          if (childPaths(layout, field.path)) continue;
          writeScalar(Module, ptr, field, flat ? flat[flatIndex++] : valueAt(value, field.path));
        }
      }

      function writeAggregateFromSpec(Module, ptr, layout, spec, start) {
        let flatIndex = start;
        for (let i = 0; i < layout.size; i++) Module.setValue(ptr + i, 0, 'i8');
        for (const field of layout.fields) {
          if (childPaths(layout, field.path)) continue;
          writeScalar(Module, ptr, field, spec[flatIndex++]);
        }
      }

      function scratchAggregate(Module, layout, value) {
        let ptr = aggregateScratch.get(layout);
        if (!ptr) {
          ptr = Module._malloc(layout.size);
          aggregateScratch.set(layout, ptr);
        }
        writeAggregateInto(Module, ptr, layout, value);
        return ptr;
      }

      function scratchAggregateFromSpec(Module, layoutName, spec, start) {
        const layout = resolveLayout(layoutName);
        let ptr = aggregateScratch.get(layout);
        if (!ptr) {
          ptr = Module._malloc(layout.size);
          aggregateScratch.set(layout, ptr);
        }
        writeAggregateFromSpec(Module, ptr, layout, spec, start);
        return ptr;
      }

      function readAggregate(Module, layout, ptr) {
        const value = {};
        for (const field of layout.fields) {
          if (childPaths(layout, field.path)) continue;
          assignPath(value, field.path, readScalar(Module, ptr, field));
        }
        return value;
      }

      function resolveLayout(ref) {
        if (!ref) return null;
        if (typeof ref === 'number') {
          const layout = layoutIds.get(ref);
          if (!layout) throw new Error(`Missing Raylib ABI layout id: ${ref}`);
          return layout;
        }
        if (typeof ref === 'string') {
          const layout = layouts.get(ref);
          if (!layout) throw new Error(`Missing Raylib ABI layout: ${ref}`);
          return layout;
        }
        if (ref.layout) return ref.layout;
        if (ref.layoutName) {
          const layout = layouts.get(ref.layoutName);
          if (!layout) throw new Error(`Missing Raylib ABI layout: ${ref.layoutName}`);
          return layout;
        }
        return null;
      }

      function writeString(Module, value) {
        const bytes = Module.lengthBytesUTF8(value || '') + 1;
        const ptr = Module._malloc(bytes);
        Module.stringToUTF8(value || '', ptr, bytes);
        return ptr;
      }

      function writeBytes(Module, base64) {
        const binary = atob(base64 || '');
        const ptr = Module._malloc(binary.length || 1);
        for (let i = 0; i < binary.length; i++) {
          Module.setValue(ptr + i, binary.charCodeAt(i), 'i8');
        }
        return ptr;
      }

      function writeAggregateArray(Module, layout, values) {
        const source = Array.isArray(values) ? values : [];
        const ptr = Module._malloc(Math.max(layout.size * source.length, layout.size));
        for (let i = 0; i < source.length; i++) {
          writeAggregateInto(Module, ptr + i * layout.size, layout, source[i]);
        }
        return ptr;
      }

      function writeUniformValue(Module, uniformType, values) {
        const type = Number(uniformType) || 0;
        const count = type === 1 || type === 5 ? 2
          : type === 2 || type === 6 ? 3
          : type === 3 || type === 7 ? 4
          : 1;
        const intValue = type >= 4 && type <= 7;
        const source = Array.isArray(values) ? values : [values];
        const elementCount = Math.max(count, source.length || 0);
        const ptr = Module._malloc(elementCount * 4 || 4);
        for (let i = 0; i < elementCount; i++) {
          const value = Number(source[i]) || 0;
          Module.setValue(ptr + i * 4, intValue ? Math.trunc(value) : value,
                          intValue ? 'i32' : 'float');
        }
        return ptr;
      }

      function returnType(ret) {
        if (Array.isArray(ret)) {
          if (ret[0] === 'a' || ret[0] === 'v') return null;
          if (ret[0] === 'b') return 'boolean';
          if (ret[0] === 's') return 'string';
          return 'number';
        }
        if (!ret || ret.layout || ret.layoutName || ret.schema === 'void') return null;
        if (ret.schema === 'boolean') return 'boolean';
        if (ret.schema === 'string') return 'string';
        return 'number';
      }

      function plannedSpec(spec) {
        if (Array.isArray(spec) && typeof spec[0] === 'number') {
          const plan = functionPlans.get(spec[0]);
          if (!plan) throw new Error(`Missing Raylib function plan: ${spec[0]}`);
          return plan;
        }
        return null;
      }

      function specName(spec) {
        const plan = plannedSpec(spec);
        return plan ? plan.name : (Array.isArray(spec) ? spec[0] : spec.name);
      }

      function specRet(spec) {
        const plan = plannedSpec(spec);
        return plan ? plan.ret : (Array.isArray(spec) ? spec[1] : spec.ret);
      }

      function specArgs(spec) {
        const plan = plannedSpec(spec);
        return plan ? (spec[1] || []) : (Array.isArray(spec) ? (spec[2] || []) : (spec.args || []));
      }

      function argKind(arg) {
        return Array.isArray(arg) ? arg[0] : arg.kind;
      }

      function argValue(arg) {
        return Array.isArray(arg) ? arg[1] : arg.value;
      }

      function argAggregateValue(arg) {
        return Array.isArray(arg) ? (arg[2] || {}) : (arg.value || {});
      }

      function argLayout(arg) {
        return Array.isArray(arg) ? arg[1] : arg;
      }

      function argUniformType(arg) {
        return Array.isArray(arg) ? arg[1] : arg.uniformType;
      }

      function argUniformValues(arg) {
        return Array.isArray(arg) ? (arg[2] || []) : (arg.values || []);
      }

      function argArrayValues(arg) {
        return Array.isArray(arg) ? (arg[2] || []) : (arg.values || []);
      }

      function wrapped(Module, name, retType, argCount) {
        const wrapperName = 'vybe_raylib_' + name;
        const wrapperKey = wrapperName + '|' + (retType || 'void') + '|' + argCount;
        let fn = wrappedFns.get(wrapperKey);
        if (!fn) {
          fn = Module.cwrap(wrapperName, retType, new Array(argCount).fill('number'));
          wrappedFns.set(wrapperKey, fn);
        }
        return fn;
      }

      function fastDrawTextureRec(Module, spec) {
        const texture = scratchAggregateFromSpec(Module, 'Texture', spec, 1);
        const source = scratchAggregateFromSpec(Module, 'Rectangle', spec, 6);
        const position = scratchAggregateFromSpec(Module, 'Vector2', spec, 10);
        const tint = scratchAggregateFromSpec(Module, 'Color', spec, 12);
        wrapped(Module, 'DrawTextureRec', null, 4)(texture, source, position, tint);
        return 0;
      }

      function fastBeginTextureMode(Module, spec) {
        const target = scratchAggregate(Module, resolveLayout('RenderTexture'), spec[1] || []);
        wrapped(Module, 'BeginTextureMode', null, 1)(target);
        return 0;
      }

      function fastEndTextureMode(Module) {
        wrapped(Module, 'EndTextureMode', null, 0)();
        return 0;
      }

      function fastBeginShaderMode(Module, spec) {
        const shader = scratchAggregate(Module, resolveLayout('Shader'), spec[1] || []);
        wrapped(Module, 'BeginShaderMode', null, 1)(shader);
        return 0;
      }

      function fastEndShaderMode(Module) {
        wrapped(Module, 'EndShaderMode', null, 0)();
        return 0;
      }

      function fastBeginMode3D(Module, spec) {
        const camera = scratchAggregate(Module, resolveLayout('Camera3D'), spec[1] || []);
        wrapped(Module, 'BeginMode3D', null, 1)(camera);
        return 0;
      }

      function fastVyBeginMode3D(Module, spec) {
        const camera = scratchAggregate(Module, resolveLayout('VyCamera'), spec[1] || []);
        wrapped(Module, 'VyBeginMode3D', null, 1)(camera);
        return 0;
      }

      function fastEndMode3D(Module) {
        wrapped(Module, 'EndMode3D', null, 0)();
        return 0;
      }

      function fastClearBackground(Module, spec) {
        const color = scratchAggregateFromSpec(Module, 'Color', spec, 1);
        wrapped(Module, 'ClearBackground', null, 1)(color);
        return 0;
      }

      function fastDrawMesh(Module, spec) {
        const mesh = Number(spec[1]) || 0;
        const material = scratchAggregate(Module, resolveLayout('Material'), spec[2] || []);
        const transform = scratchAggregate(Module, resolveLayout('Matrix'), spec[3] || []);
        wrapped(Module, 'DrawMesh', null, 3)(mesh, material, transform);
        return 0;
      }

      function fastDrawTexturePro(Module, spec) {
        const texture = scratchAggregateFromSpec(Module, 'Texture', spec, 1);
        const source = scratchAggregateFromSpec(Module, 'Rectangle', spec, 6);
        const dest = scratchAggregateFromSpec(Module, 'Rectangle', spec, 10);
        const origin = scratchAggregateFromSpec(Module, 'Vector2', spec, 14);
        const rotation = Number(spec[16]) || 0;
        const tint = scratchAggregateFromSpec(Module, 'Color', spec, 17);
        wrapped(Module, 'DrawTexturePro', null, 6)(texture, source, dest, origin, rotation, tint);
        return 0;
      }

      function fastDrawRectanglePro(Module, spec) {
        const rec = scratchAggregateFromSpec(Module, 'Rectangle', spec, 1);
        const origin = scratchAggregateFromSpec(Module, 'Vector2', spec, 5);
        const rotation = Number(spec[7]) || 0;
        const color = scratchAggregateFromSpec(Module, 'Color', spec, 8);
        wrapped(Module, 'DrawRectanglePro', null, 4)(rec, origin, rotation, color);
        return 0;
      }

      function fastDrawCircleLines(Module, spec) {
        const centerX = Number(spec[1]) || 0;
        const centerY = Number(spec[2]) || 0;
        const radius = Number(spec[3]) || 0;
        const color = scratchAggregateFromSpec(Module, 'Color', spec, 4);
        wrapped(Module, 'DrawCircleLines', null, 4)(centerX, centerY, radius, color);
        return 0;
      }

      function fastDrawCircle(Module, spec) {
        const centerX = Number(spec[1]) || 0;
        const centerY = Number(spec[2]) || 0;
        const radius = Number(spec[3]) || 0;
        const color = scratchAggregateFromSpec(Module, 'Color', spec, 4);
        wrapped(Module, 'DrawCircle', null, 4)(centerX, centerY, radius, color);
        return 0;
      }

      function fastGuiGroupBox(Module, spec) {
        const bounds = scratchAggregateFromSpec(Module, 'Rectangle', spec, 1);
        const text = writeString(Module, spec[5] || '');
        try {
          wrapped(Module, 'GuiGroupBox', null, 2)(bounds, text);
        } finally {
          Module._free(text);
        }
        return 0;
      }

      function fastGuiDummyRec(Module, spec) {
        const bounds = scratchAggregateFromSpec(Module, 'Rectangle', spec, 1);
        const text = writeString(Module, spec[5] || '');
        try {
          wrapped(Module, 'GuiDummyRec', null, 2)(bounds, text);
        } finally {
          Module._free(text);
        }
        return 0;
      }

      function fastSetShaderValueMatrix(Module, spec) {
        const shader = scratchAggregate(Module, resolveLayout('Shader'), spec[1] || []);
        const location = Number(spec[2]) || 0;
        const matrix = scratchAggregate(Module, resolveLayout('Matrix'), spec[3] || []);
        wrapped(Module, 'SetShaderValueMatrix', null, 3)(shader, location, matrix);
        return 0;
      }

      function fastDrawTextureShaderPass(Module, spec) {
        const target = scratchAggregate(Module, resolveLayout('RenderTexture'), spec[1] || []);
        const shader = scratchAggregate(Module, resolveLayout('Shader'), spec[2] || []);
        const texture = scratchAggregateFromSpec(Module, 'Texture', spec, 3);
        const source = scratchAggregateFromSpec(Module, 'Rectangle', spec, 8);
        const position = scratchAggregateFromSpec(Module, 'Vector2', spec, 12);
        const tint = scratchAggregateFromSpec(Module, 'Color', spec, 14);
        const clear = scratchAggregateFromSpec(Module, 'Color', spec, 18);
        wrapped(Module, 'BeginTextureMode', null, 1)(target);
        wrapped(Module, 'BeginShaderMode', null, 1)(shader);
        wrapped(Module, 'ClearBackground', null, 1)(clear);
        wrapped(Module, 'DrawTextureRec', null, 4)(texture, source, position, tint);
        wrapped(Module, 'EndShaderMode', null, 0)();
        wrapped(Module, 'EndTextureMode', null, 0)();
        return 0;
      }

      return {
        installLayouts(layoutData) {
          if (Array.isArray(layoutData)) {
            for (const plan of layoutData) {
              layouts.set(plan.name, plan.layout);
              layoutIds.set(plan.id, plan.layout);
            }
          } else {
            for (const [name, layout] of Object.entries(layoutData || {})) {
              layouts.set(name, layout);
            }
          }
          return layouts.size;
        },
        installFunctions(functionData) {
          for (const plan of functionData || []) {
            functionPlans.set(plan.id, plan);
          }
          return functionPlans.size;
        },
        readArray(layout, ptr, count) {
          const Module = window.vybeRaylibModule;
          const values = [];
          for (let i = 0; i < count; i++) {
            values.push(readAggregate(Module, layout, ptr + i * layout.size));
          }
          return values;
        },
        readI32Array(ptr, count) {
          const Module = window.vybeRaylibModule;
          const values = [];
          for (let i = 0; i < count; i++) {
            values.push(Module.getValue(ptr + i * 4, 'i32'));
          }
          return values;
        },
        call(spec) {
          const Module = window.vybeRaylibModule;
          if (Array.isArray(spec)) {
            if (spec[0] === 'btm') return fastBeginTextureMode(Module, spec);
            if (spec[0] === 'etm') return fastEndTextureMode(Module);
            if (spec[0] === 'bsm') return fastBeginShaderMode(Module, spec);
            if (spec[0] === 'esm') return fastEndShaderMode(Module);
            if (spec[0] === 'bm3') return fastBeginMode3D(Module, spec);
            if (spec[0] === 'vbm3') return fastVyBeginMode3D(Module, spec);
            if (spec[0] === 'em3') return fastEndMode3D(Module);
            if (spec[0] === 'cb') return fastClearBackground(Module, spec);
            if (spec[0] === 'dm') return fastDrawMesh(Module, spec);
            if (spec[0] === 'dtr') return fastDrawTextureRec(Module, spec);
            if (spec[0] === 'dtp') return fastDrawTexturePro(Module, spec);
            if (spec[0] === 'drp') return fastDrawRectanglePro(Module, spec);
            if (spec[0] === 'dcl') return fastDrawCircleLines(Module, spec);
            if (spec[0] === 'dc') return fastDrawCircle(Module, spec);
            if (spec[0] === 'ggb') return fastGuiGroupBox(Module, spec);
            if (spec[0] === 'gdr') return fastGuiDummyRec(Module, spec);
            if (spec[0] === 'svm') return fastSetShaderValueMatrix(Module, spec);
            if (spec[0] === 'dtsp') return fastDrawTextureShaderPass(Module, spec);
          }
          const name = specName(spec);
          if (name === 'WindowShouldClose') {
            return closeRequested ? 1 : 0;
          }

          const allocated = [];
          const args = [];
          for (const arg of specArgs(spec)) {
            const kind = argKind(arg);
            if (kind === 'aggregate' || kind === 'a') {
              const ptr = writeAggregate(Module, resolveLayout(argLayout(arg)), argAggregateValue(arg));
              allocated.push(ptr);
              args.push(ptr);
            } else if (kind === 'string' || kind === 's') {
              const ptr = writeString(Module, argValue(arg) || '');
              allocated.push(ptr);
              args.push(ptr);
            } else if (kind === 'bytes' || kind === 'b') {
              const ptr = writeBytes(Module, Array.isArray(arg) ? (arg[1] || '') : (arg.base64 || ''));
              allocated.push(ptr);
              args.push(ptr);
            } else if (kind === 'uniform' || kind === 'u') {
              const ptr = writeUniformValue(Module, argUniformType(arg), argUniformValues(arg));
              allocated.push(ptr);
              args.push(ptr);
            } else if (kind === 'aggregate-array' || kind === 'aa') {
              const ptr = writeAggregateArray(Module, resolveLayout(argLayout(arg)), argArrayValues(arg));
              allocated.push(ptr);
              args.push(ptr);
            } else {
              args.push(Number(argValue(arg)) || 0);
            }
          }

          let outPtr = 0;
          const ret = specRet(spec);
          const retType = returnType(ret);
          const retLayout = Array.isArray(ret) && ret[0] === 'a'
            ? resolveLayout(ret[1])
            : resolveLayout(ret);
          const argCount = args.length + (retLayout ? 1 : 0);
          const fn = wrapped(Module, name, retType, argCount);
          try {
            if (retLayout) {
              outPtr = Module._malloc(retLayout.size);
              for (let i = 0; i < retLayout.size; i++) Module.setValue(outPtr + i, 0, 'i8');
              fn(outPtr, ...args);
              return readAggregate(Module, retLayout, outPtr);
            }
            const result = fn(...args);
            return result == null ? 0 : result;
          } finally {
            if (outPtr) Module._free(outPtr);
            for (const ptr of allocated) Module._free(ptr);
          }
        },
        callBatch(specs) {
          const startedAt = performance.now();
          for (const spec of specs || []) {
            this.call(spec);
          }
          const count = (specs || []).length;
          window.vybeRaylibLastBatch = {
            sequence: ++batchSeq,
            count,
            elapsedMs: performance.now() - startedAt,
            layouts: layouts.size,
            functions: functionPlans.size,
            wrappedFns: wrappedFns.size,
            aggregateScratch: aggregateScratch.size
          };
          return count;
        },
        inputState() {
          const state = {
            keysDown: Array.from(inputState.keysDown),
            keysPressed: Array.from(inputState.keysPressed),
            keysReleased: Array.from(inputState.keysReleased),
            mouseDown: Array.from(inputState.mouseDown),
            mousePressed: Array.from(inputState.mousePressed),
            mouseReleased: Array.from(inputState.mouseReleased),
            mouseX: inputState.mouseX,
            mouseY: inputState.mouseY,
            mouseDeltaX: inputState.mouseDeltaX,
            mouseDeltaY: inputState.mouseDeltaY,
            focused: inputState.focused,
            closeRequested
          };
          inputState.keysPressed.clear();
          inputState.keysReleased.clear();
          inputState.mousePressed.clear();
          inputState.mouseReleased.clear();
          inputState.mouseDeltaX = 0;
          inputState.mouseDeltaY = 0;
          return state;
        },
        setMousePosition(x, y) {
          const rect = canvas.getBoundingClientRect();
          inputState.mouseX = clamp(Number(x) || 0, 0, canvasWidth(rect));
          inputState.mouseY = clamp(Number(y) || 0, 0, canvasHeight(rect));
          inputState.mouseDeltaX = 0;
          inputState.mouseDeltaY = 0;
          return true;
        }
      };
    }

	    createVybeRaylibModule({
	      canvas,
	      webglContextAttributes: {
	        alpha: false,
	        antialias: false,
	        majorVersion: 2,
	        powerPreference: 'high-performance',
	        preserveDrawingBuffer: false
	      },
	      locateFile(path) {
	        return path.endsWith('.wasm')
            ? './raylib.wasm?v=' + encodeURIComponent(window.vybeRaylibAssetVersion)
            : path;
	      },
      print(text) {
        console.log(text);
      },
      printErr(text) {
        console.error(text);
        status.textContent = text;
      }
    }).then((Module) => {
      window.vybeRaylibModule = Module;
      window.vybeRaylibBridge = bridgeSource();
      window.vybeRaylibBridgeReady = true;
      status.textContent = 'raylib.wasm browser bridge ready';
      canvas.focus();
    }).catch((err) => {
      console.error(err);
      status.textContent = String(err && err.stack || err);
    });
  </script>
</body>
</html>
